<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="vinylGradient" cx="30%" cy="30%">
      <stop offset="0%" style="stop-color:#333;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#111;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#000;stop-opacity:1" />
    </radialGradient>
    <radialGradient id="labelGradient" cx="35%" cy="35%">
      <stop offset="0%" style="stop-color:#ff6b9d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c91e63;stop-opacity:1" />
    </radialGradient>
  </defs>
  
  <!-- Main vinyl disc -->
  <circle cx="100" cy="100" r="95" fill="url(#vinylGradient)"/>
  
  <!-- Multiple concentric circles for groove effect -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="rgba(255,255,255,0.02)" stroke-width="1"/>
  <circle cx="100" cy="100" r="75" fill="none" stroke="rgba(255,255,255,0.02)" stroke-width="1"/>
  <circle cx="100" cy="100" r="65" fill="none" stroke="rgba(255,255,255,0.02)" stroke-width="1"/>
  <circle cx="100" cy="100" r="55" fill="none" stroke="rgba(255,255,255,0.02)" stroke-width="1"/>
  <circle cx="100" cy="100" r="45" fill="none" stroke="rgba(255,255,255,0.02)" stroke-width="1"/>
  <circle cx="100" cy="100" r="35" fill="none" stroke="rgba(255,255,255,0.02)" stroke-width="1"/>
  
  <!-- Highlight reflection on vinyl -->
  <ellipse cx="70" cy="70" rx="20" ry="25" fill="rgba(255,255,255,0.08)"/>
  
  <!-- Center label circle -->
  <circle cx="100" cy="100" r="28" fill="url(#labelGradient)"/>
  
  <!-- Center hole -->
  <circle cx="100" cy="100" r="6" fill="#000"/>
  
  <!-- Label circles -->
  <circle cx="100" cy="100" r="22" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="0.5"/>
  <circle cx="100" cy="100" r="20" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
  
  <!-- Center spindle highlight -->
  <circle cx="100" cy="100" r="5" fill="rgba(255,255,255,0.3)"/>
</svg>
